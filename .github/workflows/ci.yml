name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -cover -race ./...

      - name: Build
        run: go build -o /dev/null ./cmd/super-simple-queues